<div class="demo-seq" data-steps="4" data-interval="1600">
  <style>
    .et-wrap { display: grid; gap: 16px; font-family: var(--mono); }
    .et-term { background: var(--code-bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; }
    .et-cmd { color: var(--text-tertiary); font-size: 13px; margin-bottom: 10px; }
    .et-cmd b { color: var(--code-text); font-weight: 600; }
    .et-rows { display: grid; gap: 4px; }
    .et-row { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--code-text);
              padding: 3px 6px; border-radius: 5px; background: transparent; transition: background .4s ease; }
    .et-dot { width: 1.1em; text-align: center; font-weight: 700; }
    .et-dot::before { content: "\2022"; color: var(--text-tertiary); transition: color .4s ease; }
    /* iteration 1 — last two fail */
    .demo-seq[data-step="1"] .et-row:nth-child(n+4) { background: color-mix(in srgb, var(--red) 12%, transparent); }
    .demo-seq[data-step="1"] .et-row:nth-child(n+4) .et-dot::before { content: "\2717"; color: var(--red); }
    .demo-seq[data-step="1"] .et-row:nth-child(-n+3) .et-dot::before { content: "\2713"; color: var(--green); }
    /* iteration 2 — one fails */
    .demo-seq[data-step="2"] .et-row:nth-child(5) { background: color-mix(in srgb, var(--red) 12%, transparent); }
    .demo-seq[data-step="2"] .et-row:nth-child(5) .et-dot::before { content: "\2717"; color: var(--red); }
    .demo-seq[data-step="2"] .et-row:nth-child(-n+4) .et-dot::before { content: "\2713"; color: var(--green); }
    /* iteration 3+ — all green */
    .demo-seq[data-step="3"] .et-row .et-dot::before,
    .demo-seq[data-step="4"] .et-row .et-dot::before { content: "\2713"; color: var(--green); }

    .et-meter { display: flex; align-items: center; gap: 12px; }
    .et-bar { flex: 1; height: 9px; border-radius: 999px; background: var(--surface-3); overflow: hidden; }
    .et-fill { height: 100%; width: 4%; border-radius: 999px; background: var(--accent); transition: width .8s cubic-bezier(.4,0,.2,1), background .5s ease; }
    .demo-seq[data-step="1"] .et-fill { width: 85%; }
    .demo-seq[data-step="2"] .et-fill { width: 94%; }
    .demo-seq[data-step="3"] .et-fill, .demo-seq[data-step="4"] .et-fill { width: 100%; background: var(--green); }
    .et-pct { font-size: 13px; font-weight: 700; min-width: 4.2em; text-align: right; color: var(--text); }
    .et-pct::after { content: "run…"; }
    .demo-seq[data-step="1"] .et-pct::after { content: "85%"; }
    .demo-seq[data-step="2"] .et-pct::after { content: "94%"; }
    .demo-seq[data-step="3"] .et-pct::after, .demo-seq[data-step="4"] .et-pct::after { content: "100%"; }

    .et-iter { font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 8px; }
    .et-iter::after { content: "running test suite\2026"; }
    .demo-seq[data-step="1"] .et-iter::after { content: "iteration 1 \2014 8 failing"; }
    .demo-seq[data-step="2"] .et-iter::after { content: "iteration 2 \2014 regression fixed"; }
    .demo-seq[data-step="3"] .et-iter::after { content: "iteration 3 \2014 100% pass \2713"; }
    .demo-seq[data-step="4"] .et-iter::after { content: "branch plan annotated"; }

    .et-plan { font-family: var(--font); font-size: 13px; border-top: 1px dashed var(--border); padding-top: 12px; color: var(--text-secondary); }
    .et-check { font-weight: 700; margin-right: 7px; }
    .et-check::before { content: "\2610"; color: var(--text-tertiary); transition: color .4s ease; }
    .demo-seq[data-step="4"] .et-check::before { content: "\2611"; color: var(--green); }
    .et-note { display: block; margin-top: 7px; color: var(--green); white-space: nowrap; overflow: hidden;
               max-width: 0; opacity: .4; transition: max-width 1s steps(38, end), opacity .4s ease; }
    .demo-seq[data-step="4"] .et-note { max-width: 42ch; opacity: 1; }
  </style>

  <div class="et-wrap">
    <div class="et-term">
      <div class="et-cmd">&#10095; <b>run test suite</b> &nbsp;<span class="demo-pulse"></span></div>
      <div class="et-rows">
        <div class="et-row"><span class="et-dot"></span> CoinBalance / deducts on unlock</div>
        <div class="et-row"><span class="et-dot"></span> CoinBalance / blocks when insufficient</div>
        <div class="et-row"><span class="et-dot"></span> Playlist / advances to next item</div>
        <div class="et-row"><span class="et-dot"></span> Unlock / rejects empty id</div>
        <div class="et-row"><span class="et-dot"></span> Session / refresh after expiry</div>
      </div>
    </div>

    <div class="et-meter">
      <div class="et-bar"><div class="et-fill"></div></div>
      <div class="et-pct"></div>
    </div>
    <div class="et-iter"></div>

    <div class="et-plan">
      <span class="et-check"></span>Test Plan &mdash; unlock &amp; balance edge cases
      <span class="et-note">&#10003; Verified 2026-06-05: 18 tests pass (Unlock, CoinBalance)</span>
    </div>
  </div>
</div>
